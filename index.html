
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Công Thức Siêu Gọn</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: #333;
            --accent: #3498db;
            --text: #ffffff;
        }
        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h2 { text-align: center; font-size: 1.1rem; margin-bottom: 15px; text-transform: uppercase;}
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9rem; color: #bbb; }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 3px solid var(--border);
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        /* Định dạng riêng cho ô chọn ngày */
        input[type="date"] {
            font-family: sans-serif;
            text-transform: uppercase;
        }

        /* Hộp nguyên liệu có khả năng thu gọn */
        .ing-card {
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        
        /* Tiêu đề hộp khi thu gọn */
        .ing-header {
            background: #222;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid transparent;
        }
        .ing-card.active .ing-header {
            border-bottom-color: var(--border);
            background: #2b2b2b;
        }

        /* Thân hộp chứa các ô nhập */
        .ing-body {
            display: none;
            padding: 12px;
        }
        .ing-card.active .ing-body {
            display: block;
        }
        
        /* Chia 2 cột để tiết kiệm chiều dài điện thoại */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .field { margin-bottom: 6px; }
        .field.full-width { grid-column: span 2; }
        .field span { font-size: 0.7rem; color: #888; display: block; margin-bottom: 2px; }

        button {
            width: 100%;
            padding: 12px;
            border: 3px solid var(--border);
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            margin-top: 5px;
            cursor: pointer;
        }
        .btn-add { background: #27ae60; color: white; border: none; margin-bottom: 15px;}
        .btn-del { background: #c0392b; color: white; border: none; padding: 8px; margin-top: 5px; font-size: 0.85rem;}
        .btn-gen { background: var(--accent); color: white; border: none; font-size: 1rem; margin-top: 20px;}
        .btn-copy { background: #f1c40f; color: black; border: none; margin-bottom: 30px;}

        pre {
            background: #000;
            padding: 12px;
            border: 3px solid var(--border);
            border-radius: 6px;
            overflow-x: auto;
            font-family: monospace; /* Đổi về monospace để tính khoảng cách ký tự chuẩn xác nhất */
            font-size: 0.9rem;
            color: #fff;
            white-space: pre; /* Giữ nguyên khoảng trắng đệm */
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình Tạo Công Thức Món Ăn</h2>

    <label>Ngày thực hiện:</label>
    <input type="date" id="recipeDate">

    <label>Danh sách nguyên liệu:</label>
    <div id="ingredientsList"></div>
    <button class="btn-add" onclick="addIng()">+ Thêm Nguyên Liệu</button>

    <label>Ghi chú:</label>
    <textarea id="recipeNotes" rows="2">Húp nóng, thêm dấm tỏi hoặc chanh ớt tùy khẩu vị cá nhân.</textarea>

    <button class="btn-gen" onclick="generate()">BẤM TẠO KẾT QUẢ</button>

    <label>Kết quả công thức:</label>
    <pre id="output">Bấm nút trên để xuất mã...</pre>
    <button class="btn-copy" onclick="copy()">COPY TOÀN BỘ MÃ</button>
</div>

<datalist id="unitSuggestions">
    <option value="cm"></option>
    <option value="ml"></option>
    <option value="lít"></option>
    <option value="g"></option>
    <option value="kg"></option>
    <option value="nhúm"></option>
    <option value="thìa cafe"></option>
    <option value="thìa canh"></option>
    <option value="củ"></option>
    <option value="chiếc"></option>
    <option value="cái"></option>
    <option value="quả"></option>
    <option value="nhánh"></option>
    <option value="lát mỏng"></option>
    <option value="bát"></option>
</datalist>

<script>
    let ingCount = 0;

    // Tự động điền ngày hôm nay vào lịch khi tải trang
    document.getElementById('recipeDate').valueAsDate = new Date();

    function addIng(n='', a='', u='') {
        ingCount++;
        const div = document.createElement('div');
        div.className = 'ing-card active'; 
        
        document.querySelectorAll('.ing-card').forEach(card => card.classList.remove('active'));

        div.innerHTML = `
            <div class="ing-header" onclick="toggleCard(this.parentElement)">
                <span class="title-text">${n ? n : 'Nguyên liệu mới #' + ingCount}</span>
                <span class="icon">▼</span>
            </div>
            <div class="ing-body">
                <div class="field full-width">
                    <span>Tên nguyên liệu:</span>
                    <input class="n" value="${n}" oninput="updateTitle(this)">
                </div>
                <div class="grid-2">
                    <div class="field"><span>Số lượng:</span><input class="a" value="${a}"></div>
                    <div class="field"><span>Đơn vị:</span><input class="u" value="${u}" list="unitSuggestions" onfocus="this.setAttribute('placeholder', this.value); this.value=''; " onblur="if(this.value=='') this.value=this.getAttribute('placeholder');"></div>
                </div>
                <button class="btn-del" onclick="this.closest('.ing-card').remove()">Xóa nguyên liệu này</button>
            </div>
        `;
        document.getElementById('ingredientsList').appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function toggleCard(card) {
        card.classList.toggle('active');
    }

    function updateTitle(input) {
        const card = input.closest('.ing-card');
        const titleText = card.querySelector('.title-text');
        titleText.textContent = input.value.trim() || "Chưa nhập tên";
    }

    // Khởi tạo dữ liệu mẫu ban đầu
    addIng("Bánh phở tươi", "500", "g");
    addIng("Thịt bò tái", "200", "g");
    addIng("Nước cốt xương", "1.5", "lít");
    addIng("Hành lá + Rau thơm", "1", "ít");
    document.querySelectorAll('.ing-card').forEach(card => card.classList.remove('active'));

    // Hàm đếm độ dài chuỗi có tính tới các ký tự tiếng Việt có dấu chuẩn xác
    function getDisplayLength(str) {
        return str.length; 
    }

    function generate() {
        // Lấy ngày đã chọn và định dạng lại thành DD/MM/YYYY
        const dateInput = document.getElementById('recipeDate').value;
        let formattedDate = "";
        if (dateInput) {
            const d = new Date(dateInput);
            formattedDate = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        let txtResult = "";
        if (formattedDate) {
            txtResult += `NGÀY THỰC HIỆN: ${formattedDate}\n\n`;
        }
        txtResult += "DANH SÁCH NGUYÊN LIỆU:\n";
        
        let rawIngs = [];
        let maxLen = 0;

        // Bước 1: Thu thập dữ liệu và tìm tên nguyên liệu dài nhất để căn lề
        document.querySelectorAll('.ing-card').forEach(c => {
            const n = c.querySelector('.n').value.trim() || 'Chưa nhập tên';
            const a = c.querySelector('.a').value.trim();
            const u = c.querySelector('.u').value.trim();
            
            if(c.querySelector('.n').value.trim() || a || u) {
                rawIngs.push({ n, a, u });
                if (n.length > maxLen) {
                    maxLen = n.length;
                }
            }
        });

        // Giới hạn khoảng cách đệm tối thiểu để không bị dính chữ (ví dụ cách thêm ít nhất 2 khoảng trắng)
        const targetWidth = maxLen + 2; 

        // Bước 2: Tạo chuỗi văn bản đã được căn thẳng hàng bằng khoảng trắng
        rawIngs.forEach(ing => {
            let paddingCount = targetWidth - ing.n.length;
            let spaces = " ".repeat(paddingCount > 0 ? paddingCount : 1);
            
            // Xây dựng dòng: - Tên nguyên liệu [khoảng trắng đệm] - Số lượng Đơn vị
            let line = `- ${ing.n}${spaces}`;
            
            if (ing.a || ing.u) {
                line += `- ${ing.a} ${ing.u}`.trim();
            }
            
            txtResult += line + "\n";
        });

        const notesValue = document.getElementById('recipeNotes').value.trim();
        if (notesValue) {
            txtResult += `\nGHI CHÚ:\n${notesValue}\n`;
        }

        document.getElementById('output').textContent = txtResult;
    }

    function copy() {
        const text = document.getElementById('output').textContent;
        navigator.clipboard.writeText(text);
        alert("Đã copy thành công!");
    }
</script>
</body>
</html>
